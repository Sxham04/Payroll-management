{% extends 'payroll_app/base.html' %}
{% block content %}
<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Employee Management</h2>
        <a href="/admin/payroll_app/employee/add/" class="btn btn-success btn-sm">+ Add New</a>
    </div>
    
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Base Salary</th>
                <th class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for emp in employees %}
            <tr>
                <td>{{ emp.emp_id }}</td>
                <td>{{ emp.first_name }} {{ emp.last_name }}</td>
                <td>${{ emp.base_salary }}</td>
                <td class="text-end">
                    <a href="{% url 'generate_salary' emp.id %}" class="btn btn-outline-primary btn-sm">Process Monthly Pay</a>
                    <a href="/admin/payroll_app/employee/{{ emp.id }}/change/" class="btn btn-outline-secondary btn-sm">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
